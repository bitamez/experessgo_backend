services:
  - type: web
    name: expressgo-backend
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "python -m gunicorn bus_ticket_backend.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        value: "your_supabase_pooler_url"
      - key: FRONTEND_URL
        value: "https://expressgo.vercel.app"
      - key: DB_NAME
        value: "postgres"
      - key: DB_USER
        value: "postgres.nwshhfmcdcopweyzecmd"
      - key: DB_HOST
        value: "aws-0-eu-west-1.pooler.supabase.com"
      - key: DB_PORT
        value: "6543"
      # ⚠️  Set these secret values in the Render dashboard (Environment tab), NOT here:
      # - key: DB_PASSWORD         → your Supabase DB password
      # - key: GEMINI_API_KEY      → AIzaSyD3amTBUwFFf9bQDcKIfs9YdnVSueavbxo
      # - key: CHAPA_SECRET_KEY    → your Chapa secret key
      # - key: EMAIL_HOST_PASSWORD → your Gmail app password
